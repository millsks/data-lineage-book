[workspace]
authors = ["Kevin Mills <millsks@gmail.com>"]
channels = ["conda-forge"]
name = "data-lineage-book"
platforms = ["osx-arm64"]
version = "0.1.0"

[tasks]
# Generate changelog from conventional commits
changelog = "git-cliff --output CHANGELOG.md"
# Preview unreleased changes (stdout only, no file write)
changelog-preview = "git-cliff --unreleased"
# Generate changelog for a specific tag (usage: pixi run changelog-tag -- v1.0.0)
changelog-tag = "git-cliff --tag"
# Build the PDF book (requires xelatex on PATH and optionally mmdc for Mermaid diagrams)
build-pdf = "bash scripts/build-pdf.sh"
# Build PDF without re-rendering Mermaid diagrams (faster iteration)
build-pdf-fast = { cmd = "bash scripts/build-pdf.sh", env = { SKIP_MERMAID = "1" } }
# Build digital/screen PDF (oneside layout with symmetric margins)
build-pdf-digital = "bash scripts/build-pdf.sh --digital"
# Build digital PDF without re-rendering Mermaid diagrams (faster iteration)
build-pdf-digital-fast = { cmd = "bash scripts/build-pdf.sh --digital", env = { SKIP_MERMAID = "1" } }

[dependencies]
git-cliff = ">=2.8,<3"
pandoc = ">=3.1,<4"
